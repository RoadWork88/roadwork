<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Road Work</title>
<style>*{margin:0;padding:0;}body{overflow:hidden;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Scéna
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

// ISO kamera
const F = 12;
const aspect = window.innerWidth / window.innerHeight;
const cam = new THREE.OrthographicCamera(-F*aspect, F*aspect, F, -F, 0.1, 200);
cam.position.set(20, 20, 20);
cam.lookAt(0, 0, 0);

// Světla
scene.add(new THREE.AmbientLight(0xffffff, 1.4));
const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(12, 20, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
sun.shadow.bias = -0.001;
scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0xd0e8ff, 0.6), {position: new THREE.Vector3(-6,8,-6)}));

// Země
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({color: 0x558B2F, roughness:.95})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;
scene.add(ground);

// Stromy (bez modelu)
const treeTrunkMat = new THREE.MeshStandardMaterial({color:0x5D4037});
const treeLeafMat1 = new THREE.MeshStandardMaterial({color:0x2E7D32});
const treeLeafMat2 = new THREE.MeshStandardMaterial({color:0x388E3C});
[[-4.5,-4.5],[4.5,-4.5],[-4.5,4.5],[4.5,4.5],
 [-2,-8],[2,-8],[-2,8],[2,8],[-8,-2],[-8,2],[8,-2],[8,2]
].forEach(([tx,tz]) => {
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.07,.1,.8,7), treeTrunkMat);
  trunk.position.set(tx, .4, tz); trunk.castShadow=true; scene.add(trunk);
  const l1 = new THREE.Mesh(new THREE.SphereGeometry(.55,8,6), treeLeafMat1);
  l1.position.set(tx, 1.15, tz); l1.castShadow=true; scene.add(l1);
  const l2 = new THREE.Mesh(new THREE.SphereGeometry(.38,7,5), treeLeafMat2);
  l2.position.set(tx-.2, 1.55, tz+.2); scene.add(l2);
});

// GLTF Loader
const loader = new GLTFLoader();
function load(name, cb) {
  loader.load(name+'.glb', gltf => {
    gltf.scene.traverse(c => {
      if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; }
    });
    cb(gltf.scene);
  }, undefined, err => {
    console.warn('Nelze načíst:', name);
    cb(null);
  });
}

// Načti silnice a poskládej mapu
const roadPositions = [];
// Horizontální silnice
for(let x=-8; x<=8; x+=2) [-6,0,6].forEach(z => roadPositions.push({x,z,r:0}));
// Vertikální silnice  
for(let z=-8; z<=8; z+=2) [-6,0,6].forEach(x => roadPositions.push({x,z,r:Math.PI/2}));

let roadsPlaced = 0;
load('road-straight', model => {
  if(!model) return;
  roadPositions.forEach(p => {
    const m = model.clone();
    m.position.set(p.x, 0, p.z);
    m.rotation.y = p.r;
    m.receiveShadow = true;
    scene.add(m);
  });
});

// Křižovatky
load('road-crossroad', model => {
  if(!model) return;
  [[-6,-6],[0,-6],[6,-6],[-6,0],[0,0],[6,0],[-6,6],[0,6],[6,6]].forEach(([x,z]) => {
    const m = model.clone();
    m.position.set(x, 0, z);
    scene.add(m);
  });
});

// Budovy — commercial
const buildingSlots = [
  [-3,-3,0], [-1,-3,1], [1,-3,2], [3,-3,3],
  [-3,-1,0], [3,-1,2],
  [-3,1,1],  [3,1,3],
  [-3,3,2],  [-1,3,3], [1,3,0],  [3,3,1],
];
const commercialBuildings = ['building-a','building-b','building-c','building-d','building-e','building-f'];
const suburbanBuildings = ['building-type-a','building-type-b','building-type-c','building-type-d'];

// Načti commercial budovy
commercialBuildings.forEach((name, i) => {
  load(name, model => {
    if(!model) return;
    // Umísti na 2 sloty
    [i*2, i*2+1].forEach(idx => {
      if(idx >= buildingSlots.length) return;
      const [bx, bz, rot] = buildingSlots[idx];
      const m = model.clone();
      m.scale.setScalar(0.9 + Math.random()*.15);
      m.position.set(bx, 0, bz);
      m.rotation.y = [0, Math.PI/2, Math.PI, -Math.PI/2][rot];
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m);
    });
  });
});

// Načti suburban budovy (vnější okraj)
const outerSlots = [
  [-5,-3,0],[5,-3,1],[-5,3,2],[5,3,3],
  [-3,-5,0],[3,-5,1],[-3,5,2],[3,5,3],
];
suburbanBuildings.forEach((name, i) => {
  load(name, model => {
    if(!model) return;
    [i*2, i*2+1].forEach(idx => {
      if(idx >= outerSlots.length) return;
      const [bx, bz, rot] = outerSlots[idx];
      const m = model.clone();
      m.scale.setScalar(0.85);
      m.position.set(bx, 0, bz);
      m.rotation.y = [0, Math.PI/2, Math.PI, -Math.PI/2][rot];
      m.castShadow=true; m.receiveShadow=true;
      scene.add(m);
    });
  });
});

// NPC auta - projíždějí po ulicích
const npcRoutes = [
  {name:'sedan',    from:{x:-8,z:-6}, to:{x:8,z:-6}},
  {name:'taxi',     from:{x:8,z:0},   to:{x:-8,z:0}},
  {name:'police',   from:{x:0,z:-8},  to:{x:0,z:8}},
  {name:'suv',      from:{x:-6,z:8},  to:{x:-6,z:-8}},
  {name:'hatchback-sports', from:{x:8,z:6}, to:{x:-8,z:6}},
];
const npcs = [];
npcRoutes.forEach(route => {
  load(route.name, model => {
    if(!model) return;
    model.scale.setScalar(0.5);
    model.position.set(route.from.x, 0, route.from.z);
    model.castShadow = true;
    scene.add(model);
    npcs.push({
      mesh: model,
      from: route.from,
      to: route.to,
      t: Math.random()
    });
  });
});

// Render loop — jen renderuje, NPC auta se pohybují
let lt = performance.now();
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lt)/1000, .05); lt = ts;

  // Pohyb NPC aut
  npcs.forEach(n => {
    n.t += 0.003;
    if(n.t > 1) n.t = 0;
    n.mesh.position.set(
      n.from.x + (n.to.x - n.from.x) * n.t,
      0,
      n.from.z + (n.to.z - n.from.z) * n.t
    );
    n.mesh.rotation.y = Math.atan2(n.to.x - n.from.x, n.to.z - n.from.z);
  });

  renderer.render(scene, cam);
}
loop(performance.now());
</script>
</body>
</html>
