<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Road Work - Krok 2</title>
<style>*{margin:0;padding:0;}body{overflow:hidden;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Scéna
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// ISO kamera
const F = 10;
const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(-F*aspect, F*aspect, F, -F, 0.1, 200);
camera.position.set(15, 15, 15);
camera.lookAt(0, 0, 0);

// Světla
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(10, 20, 10);
sun.castShadow = true;
scene.add(sun);

// Země
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({color: 0x4CAF50})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Silnice
const roadMat = new THREE.MeshStandardMaterial({color: 0x424242});
[-6, 0, 6].forEach(z => {
  const r = new THREE.Mesh(new THREE.BoxGeometry(16, 0.05, 2), roadMat);
  r.position.set(0, 0, z);
  r.receiveShadow = true;
  scene.add(r);
});
[-6, 0, 6].forEach(x => {
  const r = new THREE.Mesh(new THREE.BoxGeometry(2, 0.05, 16), roadMat);
  r.position.set(x, 0, 0);
  r.receiveShadow = true;
  scene.add(r);
});

// Budovy
const colors = [0xE53935, 0x1E88E5, 0x43A047, 0xFB8C00, 0x8E24AA, 0x00ACC1, 0xF4511E, 0x3949AB];
[[-3,-3],[-3,3],[3,-3],[3,3],[1,-3],[-1,-3],[1,3],[-1,3]].forEach(([x,z], i) => {
  const h = 1.5 + Math.random() * 2.5;
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, h, 1.5),
    new THREE.MeshStandardMaterial({color: colors[i % colors.length]})
  );
  b.position.set(x, h/2, z);
  b.castShadow = true;
  scene.add(b);
});

// Auto hráče (oranžový box)
const car = new THREE.Mesh(
  new THREE.BoxGeometry(0.8, 0.4, 1.4),
  new THREE.MeshStandardMaterial({color: 0xFF6B35})
);
car.position.set(0, 0.2, 0);
car.castShadow = true;
scene.add(car);

// Špína
[-2,-1,0,1,2].forEach(x => [-2,-1,0,1,2].forEach(z => {
  if(Math.random() > 0.5) {
    const d = new THREE.Mesh(
      new THREE.PlaneGeometry(0.6, 0.5),
      new THREE.MeshStandardMaterial({color: 0x5D4037})
    );
    d.rotation.x = -Math.PI/2;
    d.position.set(x + Math.random()*0.5, 0.02, z + Math.random()*0.5);
    scene.add(d);
  }
}));

// Render loop
function loop() {
  requestAnimationFrame(loop);
  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
