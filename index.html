<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Road Work</title>
<style>*{margin:0;padding:0;}body{overflow:hidden;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

const F = 12, A = window.innerWidth/window.innerHeight;
const cam = new THREE.OrthographicCamera(-F*A,F*A,F,-F,0.1,200);
cam.position.set(20,20,20); cam.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0xffffff,1.5));
const sun = new THREE.DirectionalLight(0xfff5e0,2.2);
sun.position.set(12,20,8); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-30,right:30,top:30,bottom:-30});
sun.shadow.bias=-0.001; scene.add(sun);

// Země
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.MeshStandardMaterial({color:0x558B2F,roughness:.95})
);
ground.rotation.x=-Math.PI/2; ground.position.y=-0.02;
ground.receiveShadow=true; scene.add(ground);

// Stromy
[[-4.5,-4.5],[4.5,-4.5],[-4.5,4.5],[4.5,4.5],
 [-2,-8],[2,-8],[-2,8],[2,8],[-8,-2],[-8,2],[8,-2],[8,2]
].forEach(([tx,tz])=>{
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.07,.1,.8,7),
    new THREE.MeshStandardMaterial({color:0x5D4037}));
  trunk.position.set(tx,.4,tz); trunk.castShadow=true; scene.add(trunk);
  const leaf=new THREE.Mesh(new THREE.SphereGeometry(.55,8,6),
    new THREE.MeshStandardMaterial({color:0x2E7D32}));
  leaf.position.set(tx,1.15,tz); leaf.castShadow=true; scene.add(leaf);
});

// Silnice (fallback krabičky — okamžitě viditelné)
const roadMat=new THREE.MeshStandardMaterial({color:0x424242,roughness:.9});
const lineMat=new THREE.MeshStandardMaterial({color:0xFFFFFF});
for(let x=-8;x<=8;x+=2){
  [-6,0,6].forEach(z=>{
    const r=new THREE.Mesh(new THREE.BoxGeometry(2,.05,2),roadMat);
    r.position.set(x,0,z); r.receiveShadow=true; scene.add(r);
  });
}
for(let z=-8;z<=8;z+=2){
  [-6,0,6].forEach(x=>{
    const r=new THREE.Mesh(new THREE.BoxGeometry(2,.05,2),roadMat);
    r.position.set(x,0,z); r.receiveShadow=true; scene.add(r);
  });
}
// Bílé čáry
for(let x=-7;x<=7;x+=2.5) [-6,0,6].forEach(z=>{
  const l=new THREE.Mesh(new THREE.BoxGeometry(.7,.06,.15),lineMat);
  l.position.set(x,.03,z); scene.add(l);
});

// Budovy (fallback — okamžitě viditelné)
const bCols=[0xE53935,0x1E88E5,0x43A047,0xFB8C00,0x8E24AA,0x00ACC1,0xF4511E,0x3949AB,0x00897B,0xC0CA33,0xF4511E,0x6A1B9A];
const slots=[[-3,-3],[-1,-3],[1,-3],[3,-3],[-3,-1],[3,-1],[-3,1],[3,1],[-3,3],[-1,3],[1,3],[3,3]];
const fallbackBuildings = [];
slots.forEach(([x,z],i)=>{
  const h=1.5+Math.random()*2.5;
  const fb=new THREE.Mesh(
    new THREE.BoxGeometry(1.5,h,1.5),
    new THREE.MeshStandardMaterial({color:bCols[i%bCols.length],roughness:.7})
  );
  fb.position.set(x,h/2,z); fb.castShadow=true; scene.add(fb);
  fallbackBuildings.push({mesh:fb, x, z, idx:i});
});

// NPC auta (fallback)
const npcData=[
  {col:0x1565C0,from:{x:-8,z:-6},to:{x:8,z:-6},spd:.004},
  {col:0xF9A825,from:{x:8,z:0},to:{x:-8,z:0},spd:.005},
  {col:0x1A237E,from:{x:0,z:-8},to:{x:0,z:8},spd:.003},
  {col:0x2E7D32,from:{x:-6,z:8},to:{x:-6,z:-8},spd:.004},
  {col:0xC62828,from:{x:8,z:6},to:{x:-8,z:6},spd:.006},
];
const npcs=[];
npcData.forEach(d=>{
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(.85,.38,1.5),
    new THREE.MeshStandardMaterial({color:d.col,roughness:.7}));
  body.position.y=.27; body.castShadow=true; g.add(body);
  const top=new THREE.Mesh(new THREE.BoxGeometry(.78,.3,.75),
    new THREE.MeshStandardMaterial({color:d.col,roughness:.7}));
  top.position.set(0,.58,.2); g.add(top);
  const ws=new THREE.Mesh(new THREE.BoxGeometry(.72,.24,.04),
    new THREE.MeshStandardMaterial({color:0xB3E5FC,transparent:true,opacity:.8}));
  ws.position.set(0,.58,.58); g.add(ws);
  g.position.set(d.from.x,0,d.from.z); g.castShadow=true; scene.add(g);
  npcs.push({g,from:d.from,to:d.to,t:Math.random(),spd:d.spd});
});

// DEPO
const depot=new THREE.Mesh(new THREE.BoxGeometry(2.2,.1,2.2),
  new THREE.MeshStandardMaterial({color:0x1565C0}));
depot.position.set(0,.05,0); scene.add(depot);

// --- GLB LOADER (na pozadí, vymění fallbacky) ---
const loader=new GLTFLoader();

function loadGLB(name, onLoad){
  loader.load(name+'.glb', gltf=>{
    gltf.scene.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true;}});
    onLoad(gltf.scene);
  }, undefined, ()=>{});
}

// Načti silnice a vyměň
loadGLB('road-straight', model=>{
  // Odstraň fallback silnice a přidej GLB
  scene.children
    .filter(c=>c.isMesh && c.geometry.type==='BoxGeometry' && 
      c.material.color && c.material.color.getHex()===0x424242)
    .forEach(c=>scene.remove(c));
  for(let x=-8;x<=8;x+=2){
    [-6,0,6].forEach(z=>{
      const m=model.clone(); m.position.set(x,0,z); scene.add(m);
    });
  }
  for(let z=-8;z<=8;z+=2){
    [-6,0,6].forEach(x=>{
      const m=model.clone(); m.rotation.y=Math.PI/2; m.position.set(x,0,z); scene.add(m);
    });
  }
});

loadGLB('road-crossroad', model=>{
  [[-6,-6],[0,-6],[6,-6],[-6,0],[0,0],[6,0],[-6,6],[0,6],[6,6]].forEach(([x,z])=>{
    const m=model.clone(); m.position.set(x,0,z); scene.add(m);
  });
});

// Načti budovy a vyměň fallbacky
const bldgNames=['building-a','building-b','building-c','building-d','building-e','building-f','building-type-a','building-type-b','building-type-c','building-type-d'];
bldgNames.forEach((name,i)=>{
  loadGLB(name, model=>{
    // Vyměň 1-2 fallback budovy za GLB
    const targets=fallbackBuildings.filter((_,idx)=>idx%bldgNames.length===i);
    targets.forEach(fb=>{
      scene.remove(fb.mesh);
      const m=model.clone();
      m.scale.setScalar(.9);
      m.position.set(fb.x,0,fb.z);
      m.rotation.y=[0,Math.PI/2,Math.PI,-Math.PI/2][fb.idx%4];
      m.castShadow=true; m.receiveShadow=true;
      scene.add(m);
    });
  });
});

// Načti NPC auta a vyměň
const npcNames=['sedan','taxi','police','suv','hatchback-sports'];
npcNames.forEach((name,i)=>{
  loadGLB(name, model=>{
    if(i>=npcs.length) return;
    const npc=npcs[i];
    model.scale.setScalar(.5);
    model.position.copy(npc.g.position);
    model.rotation.copy(npc.g.rotation);
    scene.remove(npc.g);
    scene.add(model);
    npc.g=model;
  });
});

// Render loop
let lt=performance.now();
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lt)/1000,.05); lt=ts;
  npcs.forEach(n=>{
    n.t+=n.spd;
    if(n.t>1) n.t=0;
    n.g.position.set(
      n.from.x+(n.to.x-n.from.x)*n.t,0,
      n.from.z+(n.to.z-n.from.z)*n.t
    );
    n.g.rotation.y=Math.atan2(n.to.x-n.from.x,n.to.z-n.from.z);
  });
  renderer.render(scene,cam);
}
loop(performance.now());
</script>
</body>
</html>
