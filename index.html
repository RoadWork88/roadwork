<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Road Work</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{overflow:hidden;touch-action:none;font-family:sans-serif;}
#hud{position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,.72);}
#mission{flex:1;font-size:12px;font-weight:700;color:#FFD700;}
.hs{background:rgba(0,0,0,.4);border-radius:7px;padding:3px 8px;display:flex;flex-direction:column;align-items:center;}
.hv{font-size:13px;font-weight:800;color:#FFD700;}
.hv.t{color:#00D4AA;}
.hl{font-size:7px;color:rgba(255,255,255,.4);text-transform:uppercase;}
#vhud{position:absolute;z-index:9;pointer-events:none;}
.vb{width:52px;height:5px;background:rgba(0,0,0,.5);border-radius:3px;margin-bottom:2px;overflow:hidden;}
.vbf{height:100%;border-radius:3px;}
#notifs{position:absolute;top:55px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;width:90%;max-width:300px;}
.n{background:rgba(0,0,0,.9);border-radius:14px;padding:5px 14px;font-size:11px;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,.12);animation:na 3s forwards;text-align:center;}
.ng{border-color:#4CAF50;color:#81C784;}.ny{border-color:#FFD700;color:#FFD700;}.nr{border-color:#F44336;color:#EF9A9A;}
@keyframes na{0%{opacity:0;transform:translateY(-4px)}10%{opacity:1;transform:translateY(0)}75%{opacity:1}100%{opacity:0}}
#joy{position:absolute;bottom:20px;left:16px;width:96px;height:96px;touch-action:none;z-index:10;}
#jb{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);}
#jt{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.45);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#jt.on{background:rgba(255,215,0,.45);border-color:#FFD700;}
#abtns{position:absolute;bottom:20px;right:16px;display:flex;flex-direction:column;gap:7px;z-index:10;}
.ab{width:60px;height:60px;border-radius:50%;border:2.5px solid rgba(255,255,255,.18);background:rgba(0,0,0,.6);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;}
#bc{border-color:#FFD700;background:rgba(255,215,0,.1);}
#bc.on{background:rgba(255,215,0,.42);box-shadow:0 0 16px rgba(255,215,0,.5);}
#br{border-color:#2196F3;background:rgba(33,150,243,.1);}
#be{border-color:#4CAF50;background:rgba(76,175,80,.1);}
#vs{position:absolute;bottom:128px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;}
.vbtn{padding:5px 11px;border-radius:12px;border:1.5px solid rgba(255,255,255,.15);background:rgba(0,0,0,.6);color:rgba(255,255,255,.6);font-size:10px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap;}
.vbtn.on{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.12);}
</style>
</head>
<body>
<div id="hud">
  <div id="mission">🧹 Vyčisti ulice — Centrum</div>
  <div class="hs"><span class="hv" id="hm">500</span><span class="hl">Kč</span></div>
  <div class="hs"><span class="hv t" id="hc">0%</span><span class="hl">čisto</span></div>
</div>
<div id="vhud">
  <div class="vb"><div class="vbf" id="vf" style="width:100%;background:#FF9800;"></div></div>
  <div class="vb"><div class="vbf" id="vt" style="width:0%;background:#795548;"></div></div>
</div>
<div id="notifs"></div>
<div id="vs">
  <button class="vbtn on" onclick="selV('truck',this)">🚛 Zametač</button>
  <button class="vbtn" onclick="selV('garbage-truck',this)">🗑 Popelář</button>
  <button class="vbtn" onclick="selV('firetruck',this)">🚒 Kropič</button>
  <button class="vbtn" onclick="selV('van',this)">🚐 Dodávka</button>
</div>
<div id="joy"><div id="jb"><div id="jt"></div></div></div>
<div id="abtns">
  <div class="ab" id="bc">🧹</div>
  <div class="ab" id="br">⛽</div>
  <div class="ab" id="be">🗑</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// ── RENDERER ──────────────────────────────────────────────────────────────────
const R = new THREE.WebGLRenderer({antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.shadowMap.enabled=true;
R.shadowMap.type=THREE.PCFSoftShadowMap;
R.outputColorSpace=THREE.SRGBColorSpace;
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.1;
document.body.appendChild(R.domElement);

// ── SCENE + CAMERA ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB,38,72);

const F=10;
const cam = new THREE.OrthographicCamera(
  -F*(innerWidth/innerHeight), F*(innerWidth/innerHeight), F, -F, .1, 200
);
cam.position.set(18,18,18);
cam.lookAt(0,0,0);

window.addEventListener('resize',()=>{
  const a=innerWidth/innerHeight;
  cam.left=-F*a; cam.right=F*a; cam.updateProjectionMatrix();
  R.setSize(innerWidth,innerHeight);
});

// ── LIGHTS ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff,1.5));
const sun=new THREE.DirectionalLight(0xfff5e0,2.2);
sun.position.set(12,20,8); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-30,right:30,top:30,bottom:-30,near:.5,far:100});
sun.shadow.bias=-0.001; scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0xd0e8ff,.6),
  {position:new THREE.Vector3(-6,8,-6)}));

// ── MODEL SYSTEM: start immediately, swap when loaded ─────────────────────────
const COLS={
  'truck':0xFF6B35,'garbage-truck':0x558B2F,'firetruck':0xC62828,'van':0x6A1B9A,
  'delivery':0xFF8F00,'sedan':0x1565C0,'taxi':0xF9A825,'police':0x1a1a8a,
  'suv':0x2E7D32,'hatchback-sports':0xE53935,
  'road-straight':0x424242,'road-crossroad':0x383838,
  'building-a':0xE53935,'building-b':0x1E88E5,'building-c':0x43A047,
  'building-d':0xFB8C00,'building-e':0x8E24AA,'building-f':0x00ACC1,
  'building-type-a':0xF4511E,'building-type-b':0x3949AB,
  'building-type-c':0x00897B,'building-type-d':0xC0CA33,
};

function makeFallback(name){
  const isRoad=name.includes('road');
  const isBldg=name.includes('building');
  const h=isBldg?1.5+Math.random()*2:0.45;
  const geo=isRoad?new THREE.BoxGeometry(2,.05,2):
             isBldg?new THREE.BoxGeometry(1.4,h,1.4):
             new THREE.BoxGeometry(.9,.45,1.6);
  const m=new THREE.Mesh(geo,
    new THREE.MeshStandardMaterial({color:COLS[name]||0x888888,roughness:.7}));
  if(isBldg) m.position.y=h/2;
  m.castShadow=true; m.receiveShadow=true;
  const g=new THREE.Group(); g.add(m); return g;
}

const reg={};
const loader=new GLTFLoader();

function getModel(name){
  if(!reg[name]) reg[name]={loaded:null,pending:[],loading:false};
  const r=reg[name];

  // Already loaded — return clone
  if(r.loaded){
    const c=r.loaded.clone();
    c.traverse(x=>{if(x.isMesh){x.castShadow=true;x.receiveShadow=true;}});
    return c;
  }

  // Return fallback group; register for swap when loaded
  const fb=makeFallback(name);
  fb.userData._swap=name;
  r.pending.push(fb);

  // Start loading once
  if(!r.loading){
    r.loading=true;
    loader.load(`${name}.glb`,
      gltf=>{
        gltf.scene.traverse(x=>{if(x.isMesh){x.castShadow=true;x.receiveShadow=true;}});
        r.loaded=gltf.scene;
        // Swap all pending fallbacks in scene
        r.pending.forEach(fb=>{
          if(!fb.parent) return;
          const real=r.loaded.clone();
          real.traverse(x=>{if(x.isMesh){x.castShadow=true;x.receiveShadow=true;}});
          real.scale.copy(fb.scale);
          real.position.copy(fb.position);
          real.rotation.copy(fb.rotation);
          fb.parent.add(real);
          fb.parent.remove(fb);
        });
        r.pending=[];
      },
      undefined,
      ()=>{ r.loading=false; } // keep fallback on error
    );
  }
  return fb;
}

// ── BUILD MAP (runs immediately) ───────────────────────────────────────────────
// Ground
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.MeshStandardMaterial({color:0x558B2F,roughness:.95}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.02;
ground.receiveShadow=true; scene.add(ground);

// Roads
[-6,0,6].forEach(z=>{
  for(let x=-8;x<=8;x+=2){
    const m=getModel('road-straight'); m.position.set(x,0,z); scene.add(m);
  }
});
[-6,0,6].forEach(x=>{
  for(let z=-8;z<=8;z+=2){
    const m=getModel('road-straight'); m.rotation.y=Math.PI/2;
    m.position.set(x,0,z); scene.add(m);
  }
});
[[-6,-6],[0,-6],[6,-6],[-6,0],[0,0],[6,0],[-6,6],[0,6],[6,6]].forEach(([x,z])=>{
  const m=getModel('road-crossroad'); m.position.set(x,0,z); scene.add(m);
});

// Road markings
const lm=new THREE.MeshStandardMaterial({color:0xFFFFFF,roughness:.8});
for(let x=-7;x<=7;x+=2.5)[-6,0,6].forEach(z=>{
  const l=new THREE.Mesh(new THREE.BoxGeometry(.7,.06,.16),lm);
  l.position.set(x,.03,z); scene.add(l);
});
for(let z=-7;z<=7;z+=2.5)[-6,0,6].forEach(x=>{
  const l=new THREE.Mesh(new THREE.BoxGeometry(.16,.06,.7),lm);
  l.position.set(x,.03,z); scene.add(l);
});

// Sidewalks
const sm=new THREE.MeshStandardMaterial({color:0xBDBDBD,roughness:.95});
[-6,0,6].forEach(z=>[-1,1].forEach(o=>{
  const s=new THREE.Mesh(new THREE.BoxGeometry(14,.04,.55),sm);
  s.position.set(0,.01,z+o*1.3); s.receiveShadow=true; scene.add(s);
}));
[-6,0,6].forEach(x=>[-1,1].forEach(o=>{
  const s=new THREE.Mesh(new THREE.BoxGeometry(.55,.04,14),sm);
  s.position.set(x+o*1.3,.01,0); s.receiveShadow=true; scene.add(s);
}));

// Buildings
const bNames=[
  'building-a','building-b','building-c','building-d','building-e','building-f',
  'building-type-a','building-type-b','building-type-c','building-type-d'
];
[[-3,-3],[-1,-3],[1,-3],[3,-3],[-3,-1],[3,-1],[-3,1],[3,1],[-3,3],[-1,3],[1,3],[3,3]
].forEach(([x,z],i)=>{
  const m=getModel(bNames[i%bNames.length]);
  m.scale.setScalar(.9+Math.random()*.2);
  m.position.set(x,0,z);
  m.rotation.y=[0,Math.PI/2,Math.PI,-Math.PI/2][i%4];
  scene.add(m);
});

// Trees
const tm1=new THREE.MeshStandardMaterial({color:0x2E7D32});
const tm2=new THREE.MeshStandardMaterial({color:0x388E3C});
const trm=new THREE.MeshStandardMaterial({color:0x5D4037});
[[-4.5,-4.5],[4.5,-4.5],[-4.5,4.5],[4.5,4.5],
 [-2,-7.5],[2,-7.5],[-2,7.5],[2,7.5],
 [-7.5,-2],[-7.5,2],[7.5,-2],[7.5,2]].forEach(([tx,tz])=>{
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(.07,.09,.7,7),trm);
  tr.position.set(tx,.35,tz); tr.castShadow=true; scene.add(tr);
  const l1=new THREE.Mesh(new THREE.SphereGeometry(.48,8,6),tm1);
  l1.position.set(tx,1.05,tz); l1.castShadow=true; scene.add(l1);
  const l2=new THREE.Mesh(new THREE.SphereGeometry(.32,7,5),tm2);
  l2.position.set(tx-.18,1.42,tz+.18); scene.add(l2);
});

// DEPO (center, blue)
const depot=new THREE.Mesh(new THREE.BoxGeometry(2.2,.1,2.2),
  new THREE.MeshStandardMaterial({color:0x1565C0,roughness:.5}));
depot.position.set(0,.05,0); scene.add(depot);

// Gas station
const gf=new THREE.Mesh(new THREE.BoxGeometry(2,.06,2),
  new THREE.MeshStandardMaterial({color:0xFFF9C4}));
gf.position.set(4.5,.03,4.5); scene.add(gf);
const gp=new THREE.Mesh(new THREE.BoxGeometry(.5,.9,.5),
  new THREE.MeshStandardMaterial({color:0xFF6F00}));
gp.position.set(4.5,.45,5.2); gp.castShadow=true; scene.add(gp);
const gr=new THREE.Mesh(new THREE.BoxGeometry(2.2,.08,2.2),
  new THREE.MeshStandardMaterial({color:0xE0E0E0}));
gr.position.set(4.5,1.2,4.5); scene.add(gr);

// ── DIRT ──────────────────────────────────────────────────────────────────────
const dirts=[];
[[-2,-2],[0,-4],[2,-2],[3,0],[2,2],[0,4],[-2,2],[-3,0],
 [-1,-1],[1,-1],[1,1],[-1,1],[-4,-2],[4,-2],[-4,2],[4,2],
 [-3,-5],[3,-5],[-2,5],[3,4],[-5,-1],[5,1],[2,-5],[-3,4]
].forEach((s,i)=>{
  const m=new THREE.Mesh(
    new THREE.PlaneGeometry(.7+Math.random()*.8,.5+Math.random()*.6),
    new THREE.MeshStandardMaterial({
      color:[0x5D4037,0x6D4C41,0x4E342E,0x795548,0x3E2723][i%5],roughness:1}));
  m.rotation.x=-Math.PI/2; m.rotation.z=Math.random()*Math.PI;
  m.position.set(s[0]+(Math.random()-.5)*.4,.025,s[1]+(Math.random()-.5)*.4);
  m.userData.cleaned=false; m.receiveShadow=true;
  scene.add(m); dirts.push(m);
});

// ── NPC CARS ──────────────────────────────────────────────────────────────────
const npcs=[];
[{n:'sedan',p:[{x:-8,z:-6},{x:8,z:-6}],s:.018},
 {n:'taxi',p:[{x:8,z:0},{x:-8,z:0}],s:.022},
 {n:'police',p:[{x:0,z:-8},{x:0,z:8}],s:.016},
 {n:'suv',p:[{x:-6,z:-8},{x:-6,z:8}],s:.014},
 {n:'hatchback-sports',p:[{x:8,z:6},{x:-8,z:6}],s:.025},
 {n:'delivery',p:[{x:6,z:8},{x:6,z:-8}],s:.013}
].forEach(r=>{
  const m=getModel(r.n); m.scale.setScalar(.48);
  m.position.set(r.p[0].x,0,r.p[0].z); scene.add(m);
  npcs.push({m,p:r.p,t:Math.random(),s:r.s,i:0});
});

// ── PLAYER ────────────────────────────────────────────────────────────────────
let player=null;
const pPos=new THREE.Vector3();
let pA=0,tA=0;

function spawnPlayer(name){
  if(player) scene.remove(player);
  player=getModel(name);
  player.scale.setScalar(.5);
  player.position.copy(pPos);
  player.castShadow=true;
  scene.add(player);
}
spawnPlayer('truck');

// ── GAME STATE ────────────────────────────────────────────────────────────────
const G={
  money:500,fuel:100,fuelMax:100,
  tank:0,tankMax:80,
  cleaning:false,
  totalDirt:dirts.length,cleanedDirt:0
};

function updateHUD(){
  document.getElementById('hm').textContent=G.money.toLocaleString('cs-CZ');
  const p=G.totalDirt>0?Math.round(G.cleanedDirt/G.totalDirt*100):0;
  document.getElementById('hc').textContent=p+'%';
  document.getElementById('vf').style.width=(G.fuel/G.fuelMax*100)+'%';
  document.getElementById('vt').style.width=(G.tank/G.tankMax*100)+'%';
}
function updateVHUD(){
  if(!player)return;
  const p=player.position.clone().add(new THREE.Vector3(0,2.5,0));
  p.project(cam);
  const vh=document.getElementById('vhud');
  vh.style.left=(p.x*.5+.5)*innerWidth-26+'px';
  vh.style.top=(-.5*p.y+.5)*innerHeight-18+'px';
}
function notify(msg,c=''){
  const el=document.createElement('div');
  el.className='n '+c; el.textContent=msg;
  document.getElementById('notifs').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ── JOYSTICK ──────────────────────────────────────────────────────────────────
const jb=document.getElementById('jb'),jt=document.getElementById('jt');
let jid=null,jcx=0,jcy=0,jR=29,jx=0,jz=0;
function jS(e){
  e.preventDefault();
  const t=e.touches[0]; jid=t.identifier;
  const r=jb.getBoundingClientRect();
  jcx=r.left+r.width/2; jcy=r.top+r.height/2;
  jt.classList.add('on'); jMov(e);
}
function jMov(e){
  if(jid===null)return; e.preventDefault();
  const t=Array.from(e.touches).find(tt=>tt.identifier===jid); if(!t)return;
  let dx=t.clientX-jcx,dz=t.clientY-jcy;
  const d=Math.hypot(dx,dz); if(d>jR){dx=dx/d*jR;dz=dz/d*jR;}
  jt.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dz}px))`;
  jx=dx/jR; jz=dz/jR;
}
function jE(){
  jid=null; jx=0; jz=0;
  jt.style.transform='translate(-50%,-50%)';
  jt.classList.remove('on');
}
document.getElementById('joy').addEventListener('touchstart',jS,{passive:false});
document.getElementById('joy').addEventListener('touchmove',jMov,{passive:false});
document.getElementById('joy').addEventListener('touchend',jE);
document.getElementById('joy').addEventListener('touchcancel',jE);

const keys={};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// ── BUTTONS ───────────────────────────────────────────────────────────────────
const bc=document.getElementById('bc');
function toggleClean(e){
  if(e) e.preventDefault();
  G.cleaning=!G.cleaning;
  bc.classList.toggle('on',G.cleaning);
  notify(G.cleaning?'🧹 Čištění ZAPNUTO':'⏸ Čištění vypnuto',G.cleaning?'ng':'');
}
bc.addEventListener('click',toggleClean);
bc.addEventListener('touchstart',toggleClean,{passive:false});

function refill(e){
  if(e) e.preventDefault();
  if(Math.hypot(pPos.x,pPos.z)<2.5){
    const c=Math.round((G.fuelMax-G.fuel)*.8);
    if(G.money>=c||c===0){G.money-=c;G.fuel=G.fuelMax;notify('⛽ Doplněno! -'+c+' Kč','ng');updateHUD();}
    else notify('💸 Nedostatek!','nr');
  } else notify('⛽ Jeď na modré DEPO uprostřed!');
}
document.getElementById('br').addEventListener('click',refill);
document.getElementById('br').addEventListener('touchstart',refill,{passive:false});

function empty(e){
  if(e) e.preventDefault();
  if(Math.hypot(pPos.x,pPos.z)<2.5){
    const earn=Math.round(G.tank*3);
    G.money+=earn; G.tank=0;
    if(earn>0) notify('🗑 +'+earn+' Kč','ny');
    updateHUD();
  } else notify('🗑 Jeď na modré DEPO!');
}
document.getElementById('be').addEventListener('click',empty);
document.getElementById('be').addEventListener('touchstart',empty,{passive:false});

window.selV=function(name,btn){
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  spawnPlayer(name);
};

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
let lt=performance.now();
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lt)/1000,.05); lt=ts;

  // Input
  let ix=jx,iz=jz;
  if(keys['w']||keys['arrowup'])iz-=1;
  if(keys['s']||keys['arrowdown'])iz+=1;
  if(keys['a']||keys['arrowleft'])ix-=1;
  if(keys['d']||keys['arrowright'])ix+=1;
  const mg=Math.hypot(ix,iz); if(mg>1){ix/=mg;iz/=mg;}

  // Move player
  if((ix||iz)&&G.fuel>0&&player){
    const wx=(ix-iz)*.707,wz=(ix+iz)*.707;
    pPos.x=Math.max(-8,Math.min(8,pPos.x+wx*4.5*dt));
    pPos.z=Math.max(-8,Math.min(8,pPos.z+wz*4.5*dt));
    player.position.set(pPos.x,0,pPos.z);
    tA=Math.atan2(wx,wz);
    G.fuel=Math.max(0,G.fuel-.45*dt*60);
    if(G.fuel<=0) notify('⛽ Prázdná nádrž!','nr');
  }

  // Rotate
  let da=tA-pA;
  while(da>Math.PI)da-=Math.PI*2;
  while(da<-Math.PI)da+=Math.PI*2;
  pA+=da*.15;
  if(player) player.rotation.y=pA;

  // Clean
  if(G.cleaning&&G.fuel>0&&G.tank<G.tankMax){
    dirts.forEach(d=>{
      if(d.userData.cleaned)return;
      if(Math.hypot(d.position.x-pPos.x,d.position.z-pPos.z)<1.3){
        d.userData.cleaned=true; d.visible=false;
        G.tank=Math.min(G.tankMax,G.tank+1);
        G.cleanedDirt++;
        G.money+=3+Math.floor(Math.random()*5);
        G.fuel=Math.max(0,G.fuel-.15);
        updateHUD();
        if(G.cleanedDirt===G.totalDirt){
          notify('🎉 Mise splněna! +200 Kč','ny');
          G.money+=200; updateHUD();
        }
      }
    });
    if(G.tank>=G.tankMax) notify('🗑 Nádrž plná! Jeď vysypat na DEPO');
  }

  // NPC movement
  npcs.forEach(n=>{
    n.t+=n.s;
    if(n.t>=1){n.t=0;n.i=(n.i+1)%n.p.length;}
    const f=n.p[n.i],to=n.p[(n.i+1)%n.p.length];
    n.m.position.set(f.x+(to.x-f.x)*n.t,0,f.z+(to.z-f.z)*n.t);
    n.m.rotation.y=Math.atan2(to.x-f.x,to.z-f.z);
  });

  // Camera follow
  cam.position.set(pPos.x+18,18,pPos.z+18);
  cam.lookAt(pPos);

  updateHUD();
  updateVHUD();
  R.render(scene,cam);
}

// ── START ─────────────────────────────────────────────────────────────────────
requestAnimationFrame(loop);
notify('👆 Táhni prstem = pohyb','ng');
setTimeout(()=>notify('🧹 Žluté tlačítko = zapni čištění',''),2500);
setTimeout(()=>notify('⛽ Modré DEPO uprostřed = doplnit palivo',''),5000);
document.body.addEventListener('touchmove',e=>e.cancelable&&e.preventDefault(),{passive:false});
</script>
